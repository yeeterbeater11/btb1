<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beat the Bet</title>
  <meta name="description" content="Your gambling recovery companion" />
  <meta name="theme-color" content="#1e293b" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM (18) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (JSX transpiler) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Recharts pinned to React 18 compatible version -->
  <script src="https://unpkg.com/recharts@2.1.16/umd/Recharts.js"></script>

  <!-- Lucide Icons (correct UMD path) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    IMPORTANT: We fetch beat-the-bet.jsx as text, strip the "export default"
    keyword, append the ReactDOM mount call, then eval it via Babel.
    This avoids ES module issues with Babel standalone.
  -->
  <script>
    fetch('/beat-the-bet.jsx')
      .then(r => r.text())
      .then(code => {
        // Remove "export default" so Babel standalone can handle it
        const cleaned = code.replace(/export\s+default\s+function\s+/, 'function ');

        // Append the mount call
        const withMount = cleaned + `
;
const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(BeatTheBet));
`;

        // Transform and eval via Babel
        const transformed = Babel.transform(withMount, { presets: ['react'] }).code;
        eval(transformed);
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          '<div style="color:white;padding:40px;font-family:sans-serif;">' +
          '<h2>Failed to load app</h2><pre>' + err + '</pre></div>';
      });
  </script>
</body>
</html>
